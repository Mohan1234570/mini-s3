spring.application.name=mini-s3
spring.datasource.url=jdbc:postgresql://localhost:5432/mini_s3
spring.datasource.username=postgres
spring.datasource.password=km
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Allow large file uploads (up to 500MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB


# Storage nodes
storage.nodes.list[0].id=node-1
storage.nodes.list[0].host=localhost
storage.nodes.list[0].port=9001

storage.nodes.list[1].id=node-2
storage.nodes.list[1].host=localhost
storage.nodes.list[1].port=9002

storage.nodes.list[2].id=node-3
storage.nodes.list[2].host=localhost
storage.nodes.list[2].port=9003


# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=mini-s3-replication
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Replication
replication.factor=3
replication.heartbeat-interval-ms=5000
replication.heartbeat-miss-threshold=3
